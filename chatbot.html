<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - ThermalGuard</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .assistant-shell {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 18px;
        }
        .assistant-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .assistant-header h2 {
            margin: 0;
            font-size: 32px;
        }
        .assistant-subtitle {
            margin-top: 6px;
            color: #a0aec0;
            font-size: 14px;
        }
        .back-home {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 700;
            white-space: nowrap;
        }
        .assistant-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .chat-panel {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
        }
        #chatMessages {
            height: 500px;
            overflow-y: auto;
            margin-bottom: 12px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: #0f172a;
        }
        .message {
            margin: 8px 0;
            padding: 10px 12px;
            border-radius: 10px;
            max-width: 90%;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .user-message {
            background-color: #2563eb;
            color: white;
            margin-left: auto;
        }
        .bot-message {
            background-color: #1f2937;
            color: #e5e7eb;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: #0b1220;
            color: #e5e7eb;
        }
        #userInput:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 2px rgba(255, 107, 53, 0.2);
        }
        #sendButton {
            padding: 10px 18px;
            background-color: #ff6b35;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }
        #sendButton:hover {
            background-color: #e95d2f;
        }
        #sendButton:disabled {
            background-color: #6b7280;
            cursor: not-allowed;
        }
        @media (max-width: 900px) {
            #chatMessages {
                height: 380px;
            }
        }
    </style>
</head>
<body>

<div class="assistant-shell">
    <div class="assistant-header">
        <div>
            <h2>ThermalGuard AI Assistant</h2>
            <div class="assistant-subtitle">Ask ward heat-risk, mitigation, simulation, NGO, and funding-priority questions.</div>
        </div>
        <a class="back-home" href="index.html">⬅ Back to Home</a>
    </div>

    <div class="assistant-grid">
        <div class="chat-panel">
            <div id="chatMessages"></div>
            <div class="input-row">
                <input type="text" id="userInput" placeholder="Type your question...">
                <button onclick="sendMessage()" id="sendButton">Send</button>
            </div>
        </div>

    </div>
</div>

<script>
let chatMessages = document.getElementById('chatMessages');
let userInput = document.getElementById('userInput');
let sendButton = document.getElementById('sendButton');

function addMessage(text, isUser = false) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
    messageDiv.textContent = text;
    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;

    addMessage(message, true);
    userInput.value = '';
    sendButton.disabled = true;
    sendButton.textContent = 'Sending...';

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ message })
        });

        if (!response.ok) {
            throw new Error('Failed to get response');
        }

        const data = await response.json();
        addMessage(data.reply);
    } catch (error) {
        addMessage('Sorry, I encountered an error. Please try again.');
        console.error('Chat error:', error);
    } finally {
        sendButton.disabled = false;
        sendButton.textContent = 'Send';
    }
}

userInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        sendMessage();
    }
});

addMessage('Hello! I am your ThermalGuard AI assistant. Ask me about heat risk by zone, why risk is high, mitigation strategies, simulations, NGO impact, and priority funding recommendations.');
</script>

</body>
</html>
